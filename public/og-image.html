<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1b69 50%, #1a0a2e 100%);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
}
.glow1 {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.25), transparent 70%);
    border-radius: 50%;
}
.glow2 {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(245,158,11,0.15), transparent 70%);
    border-radius: 50%;
}
.content {
    text-align: center;
    position: relative;
    z-index: 1;
}
.logo {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 32px;
    letter-spacing: -0.02em;
}
h1 {
    font-size: 56px;
    font-weight: 800;
    color: white;
    line-height: 1.15;
    letter-spacing: -0.035em;
    max-width: 800px;
    margin-bottom: 24px;
}
h1 span {
    background: linear-gradient(135deg, #7c3aed, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
p {
    font-size: 20px;
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
}
</style>
</head>
<body>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="content">
    <div class="logo">Afia Labs</div>
    <h1>Building <span>delightful apps</span> that make life easier.</h1>
    <p>Smart, fun, and useful mobile experiences for everyone.</p>
</div>
</body>
</html>
